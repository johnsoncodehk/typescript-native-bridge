name: ci

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

env:
  VOLAR_BRANCH: feat/tnb-migration
  VOLAR_SHA: 398ac0a71 # vuejs/language-tools@feat/tnb-migration, pinned for reproducibility

jobs:
  regression:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26" # typescript-go/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Install typescript submodule dependencies
        run: npm ci
        working-directory: typescript

      - name: Install typescript-go submodule dependencies
        run: npm ci
        working-directory: typescript-go

      - name: Build js (tsgo native-preview -> vendor)
        run: npm run build:js

      - name: Build lib (patched TypeScript fork)
        run: npm run build:lib

      - name: Build bridge (cgo dylib)
        run: npm run build:bridge

      - name: Gates
        run: |
          npm run check:lib
          npm run check:enums

      - name: Clone volar (cache)
        id: volar-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/volar
            ${{ runner.temp }}/volar-stock
          key: volar-${{ env.VOLAR_SHA }}-v1

      - name: Clone volar
        if: steps.volar-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 50 --branch "$VOLAR_BRANCH" https://github.com/vuejs/language-tools.git "$RUNNER_TEMP/volar"
          git -C "$RUNNER_TEMP/volar" checkout "$VOLAR_SHA"
          # pnpm's `typescript: link:./typescript-native-bridge` override must
          # resolve at install time — create the symlink BEFORE pnpm install.
          ln -sfn "$GITHUB_WORKSPACE" "$RUNNER_TEMP/volar/typescript-native-bridge"

      - name: Install + build volar
        if: steps.volar-cache.outputs.cache-hit != 'true'
        run: |
          cd "$RUNNER_TEMP/volar"
          corepack enable
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Pack stock typescript
        if: steps.volar-cache.outputs.cache-hit != 'true'
        run: |
          mkdir "$RUNNER_TEMP/volar-stock"
          cd "$RUNNER_TEMP/volar-stock"
          npm pack typescript@6.0.3 --silent
          tar -xzf typescript-6.0.3.tgz

      - name: Link TNB into volar
        run: ln -sfn "$GITHUB_WORKSPACE" "$RUNNER_TEMP/volar/typescript-native-bridge"

      - name: Regression witnesses
        env:
          VOLAR_ROOT: ${{ runner.temp }}/volar
          STOCK_TSSERVER_PATH: ${{ runner.temp }}/volar-stock/package/lib/tsserver.js
        run: |
          failed=()
          for w in \
            triage-sim-xfile \
            triage-xrefs-diag-variants \
            triage-qi-delete-min \
            triage-sim-edit \
            triage-quickinfo-emptyparity \
            triage-refs-exportspec \
            triage-tostring-gtd-vue \
            triage-defineprops-refs \
            triage-completion-parity \
            triage-f2hl-augment \
            triage-f2hl-typesref \
            triage-f2hl-jsdoc \
            triage-f2hl-defaultkw \
            triage-f2qi-names \
            triage-geterr-5823 \
            triage-f2r5-defcases \
            triage-f2r6-libref \
            triage-f2r6-samevue \
            triage-f2r6-xvue \
            triage-completion-details-array \
            triage-adv6a-jsx-spelling \
            triage-adv6b-generic-sig \
            triage-ambient-rpc-fallback \
            triage-impl-kind \
            triage-rpcsym-nameless \
            triage-rpcsym-adversarial \
            triage-orphan-leak \
            triage-parent-watch-acceptance \
          ; do
            echo "=== $w ==="
            node "tools/$w.mjs" || failed+=("$w")
          done
          if ((${#failed[@]})); then
            echo "WITNESS FAILURES (${#failed[@]}): ${failed[*]}"
            exit 1
          fi

      - name: sweep-ls-throws
        env:
          VOLAR_ROOT: ${{ runner.temp }}/volar
        run: |
          TNB_TRACE_THROW=1 TNB_TRACE_THROW_FILE=/tmp/tnb-throw-ci.jsonl \
            node tools/sweep-ls-throws.mjs 2>&1 | tee /tmp/tnb-sweep-ci.log
          grep -q "correlated throw hits: 0" /tmp/tnb-sweep-ci.log \
            || { echo "sweep correlated hits != 0"; exit 1; }

      - name: sourcefile-guard
        env:
          VOLAR_ROOT: ${{ runner.temp }}/volar
        run: npm run check:sourcefile-guard

      - name: Cleanup harness processes
        if: always()
        run: node tools/kill-leaked-harness.mjs || true
