name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # GitHub Release
  id-token: write # npm provenance / trusted publishing

jobs:
  build-lib:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26" # typescript-go/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Install typescript submodule dependencies
        run: npm ci
        working-directory: typescript

      - name: Install typescript-go submodule dependencies
        run: npm ci
        working-directory: typescript-go

      - name: Build js (tsgo native-preview -> vendor)
        run: npm run build:js

      - name: Build lib (patched TypeScript fork)
        run: npm run build:lib

      - name: Gates
        run: |
          npm run check:lib
          npm run check:enums

      - name: Upload main package payload
        uses: actions/upload-artifact@v4
        with:
          name: lib-dist
          path: |
            package.json
            README.md
            LICENSE
            NOTICE
            bin/
            lib/
            vendor/
          retention-days: 1

  build-bridge:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: darwin-arm64, runner: macos-latest }
          # darwin-x64 cross-compiles on the arm64 runner (clang -arch x86_64):
          # GitHub's Intel pool (macos-13 retired 2025; macos-15-intel) is tiny
          # and routinely congested — depending on it makes releases hang on
          # queue capacity. Verified locally: Mach-O x86_64 dylib out of an
          # arm64 Mac with CGO_ENABLED=1 GOOS=darwin GOARCH=amd64.
          - { target: darwin-x64, runner: macos-latest, goos: darwin, goarch: amd64, cc: clang, cgo_cflags: "-arch x86_64", cgo_ldflags: "-arch x86_64" }
          - { target: win32-x64, runner: ubuntu-latest, goos: windows, goarch: amd64, cc: x86_64-w64-mingw32-gcc, llvm_mingw: "1", node_lib: "https://nodejs.org/dist/v24.15.0/win-x64/node.lib" }
          - { target: win32-arm64, runner: ubuntu-latest, goos: windows, goarch: arm64, cc: aarch64-w64-mingw32-gcc, llvm_mingw: "1", node_lib: "https://nodejs.org/dist/v24.15.0/win-arm64/node.lib" }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout typescript-go submodule
        run: git submodule update --init --depth 1 typescript-go

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26" # typescript-go/go.mod

      - name: Apply tsgo patches
        run: node tools/patch-tsgo.js

      - name: Install cross toolchain
        if: matrix.apt
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: Install llvm-mingw
        if: matrix.llvm_mingw
        run: |
          curl -sSL https://github.com/mstorsjo/llvm-mingw/releases/download/20250417/llvm-mingw-20250417-ucrt-ubuntu-22.04-x86_64.tar.xz | sudo tar -xJ -C /opt
          echo "/opt/llvm-mingw-20250417-ucrt-ubuntu-22.04-x86_64/bin" >> "$GITHUB_PATH"

      - name: Download node.lib (windows targets)
        if: matrix.node_lib
        run: curl -sSL "${{ matrix.node_lib }}" -o /tmp/node.lib

      - name: Build bridge (stripped)
        run: node tools/build-bridge.js
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CC: ${{ matrix.cc }}
          CGO_CFLAGS: ${{ matrix.cgo_cflags }}
          CGO_LDFLAGS: ${{ matrix.cgo_ldflags }}
          TNB_NODE_LIB: ${{ matrix.node_lib != null && '/tmp/node.lib' || '' }}
          CGO_ENABLED: 1
          TNB_STRIP: 1

      - name: Upload bridge binary
        uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.target }}
          path: native/bridge.*
          retention-days: 1

  build-bridge-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: linux-x64, runner: ubuntu-latest, load: true }
          - { target: linux-arm64, runner: ubuntu-24.04-arm, load: true }
          - { target: linux-arm, runner: ubuntu-latest, goos: linux, goarch: arm, goarm: "7", cc: arm-linux-gnueabihf-gcc, apt: gcc-arm-linux-gnueabihf }
    runs-on: ${{ matrix.runner }}
    container: debian:bullseye-slim
    steps:
      - name: Install build dependencies
        run: apt-get update && apt-get install -y binutils ca-certificates gcc git ${{ matrix.apt }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout typescript-go submodule
        # Container runs as root; the mounted workspace is owned by the
        # runner user, which trips git's dubious-ownership check.
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init --depth 1 typescript-go

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26" # typescript-go/go.mod

      - name: Apply tsgo patches
        run: node tools/patch-tsgo.js

      - name: Build bridge against glibc 2.31
        run: node tools/build-bridge.js
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CC: ${{ matrix.cc }}
          CGO_ENABLED: 1
          TNB_STRIP: 1

      - name: Verify glibc floor
        run: |
          max_glibc="$(readelf --version-info native/bridge.node \
            | grep -oE 'GLIBC_[0-9]+(\.[0-9]+)*' \
            | sort -Vu \
            | tail -1)"
          if [ -z "$max_glibc" ]; then
            echo "bridge has no readable GLIBC version requirements"
            exit 1
          fi
          echo "maximum required glibc: $max_glibc"
          if [ "$(printf '%s\n' GLIBC_2.31 "$max_glibc" | sort -V | tail -1)" != GLIBC_2.31 ]; then
            echo "bridge requires $max_glibc, newer than the GLIBC_2.31 release floor"
            exit 1
          fi

      - name: Load bridge on glibc 2.31
        if: matrix.load
        run: >
          node -e "try { const b = require('./native/bridge.node'); const keys = Object.keys(b); console.log('loaded, exports:', keys.join(',')); if (typeof b.newSession !== 'function') { console.error('FAIL: newSession missing'); process.exit(1); } } catch (e) { console.error('FAIL: require threw:', e && e.stack || e); process.exit(1); }"

      - name: Upload bridge binary
        uses: actions/upload-artifact@v4
        with:
          name: bridge-${{ matrix.target }}
          path: native/bridge.*
          retention-days: 1

  test-bridge-win32-x64:
    needs: build-bridge
    runs-on: windows-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/download-artifact@v4
        with:
          name: bridge-win32-x64
          path: native

      - name: Load bridge on Windows
        # Quoting-proof: the probe is a file (no pwsh argument mangling) and
        # every marker is a synchronous write (a hard LoadLibrary crash can
        # lose piped stdout). EXIT= carries the real exit code — 0xC0000005
        # shows as -1073741819, distinguishing crash from exit(1).
        run: |
          @'
          const fs = require('fs');
          fs.writeSync(1, 'node ' + process.version + '\n');
          fs.writeSync(1, 'pre-load\n');
          try {
            const b = require('./native/bridge.node');
            fs.writeSync(1, 'loaded, exports: ' + Object.keys(b).join(',') + '\n');
            if (typeof b.newSession !== 'function') { fs.writeSync(2, 'FAIL: newSession missing\n'); process.exit(1); }
          } catch (e) {
            fs.writeSync(2, 'FAIL: require threw: ' + (e && e.stack || e) + '\n');
            process.exit(1);
          }
          '@ | Set-Content -Encoding ascii probe.js
          node probe.js
          echo "EXIT=$LASTEXITCODE"

      - uses: actions/download-artifact@v4
        with:
          name: lib-dist
          path: staging

      - name: Typecheck a tsconfig project (full tsc path)
        # require() alone misses adapter-level Windows bugs: tsc hands the
        # bridge backslash paths, and only the full lib + project open
        # exercises that (the win32 "project not found" class).
        run: |
          mkdir staging/native
          cp native/bridge.* staging/native/
          mkdir proj/src
          '{ "compilerOptions": { "strict": true }, "include": ["src/**/*.ts"] }' | Set-Content proj/tsconfig.json
          'export const x: number = 1;' | Set-Content proj/src/index.ts
          node staging/lib/_tsc.js --noEmit -p proj/tsconfig.json
          echo "TSC-P-EXIT=$LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Incremental single-project build (tsc --noEmit --incremental)
        # Same BuilderState fileInfos/resolvedPath key-form invariant as the
        # tsc -b step, but via performIncrementalCompilation — the win32
        # updateShapeSignature crash (undefined.signature) surfaced here with
        # a fresh .tsbuildinfo too. Fresh run + rerun (oldState path).
        run: |
          mkdir inc/src
          '{ "compilerOptions": { "incremental": true, "tsBuildInfoFile": "./.tsbuildinfo", "strict": true, "noEmit": true }, "include": ["src/**/*.ts"] }' | Set-Content inc/tsconfig.json
          'export const x: number = 1;' | Set-Content inc/src/index.ts
          'import { x } from "./index"; export const y: number = x;' | Set-Content inc/src/dep.ts
          node staging/lib/_tsc.js --noEmit -p inc/tsconfig.json
          echo "TSC-INC-EXIT=$LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          node staging/lib/_tsc.js --noEmit -p inc/tsconfig.json
          echo "TSC-INC-RERUN-EXIT=$LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Solution-build a composite project graph (tsc -b)
        # The BuilderState fileInfos/resolvedPath canonicalization mismatch
        # only fires in the builder drain: updateShapeSignature read
        # fileInfos.get(resolvedPath) — keyed forward-slash from Go names,
        # looked up backslash from win32 path.normalize — and crashed
        # (undefined.signature). tsc -p above never exercises it. The second
        # -b run reads the written tsbuildinfo back (oldState path).
        run: |
          mkdir sol/a/src, sol/b/src
          '{ "files": [], "references": [{ "path": "./a" }, { "path": "./b" }] }' | Set-Content sol/tsconfig.json
          '{ "compilerOptions": { "composite": true, "strict": true, "outDir": "dist", "declaration": true }, "include": ["src/**/*.ts"] }' | Set-Content sol/a/tsconfig.json
          '{ "compilerOptions": { "composite": true, "strict": true, "outDir": "dist", "declaration": true }, "references": [{ "path": "../a" }], "include": ["src/**/*.ts"] }' | Set-Content sol/b/tsconfig.json
          'export const a: number = 1;' | Set-Content sol/a/src/index.ts
          'import { a } from "../../a/src/index"; export const b: number = a;' | Set-Content sol/b/src/index.ts
          node staging/lib/_tsc.js -b sol/tsconfig.json
          echo "TSC-B-EXIT=$LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          node staging/lib/_tsc.js -b sol/tsconfig.json
          echo "TSC-B-RERUN-EXIT=$LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Checker type query keeps proto methods (component-meta class)
        # win32 node-mapping regression: a getTypeAtLocation that misses its
        # tsgo node falls back to errorType — which must still be a full Type
        # (patchTypeProto), and a hit must return real signatures. The volar
        # component-meta suite crashed here with
        # "componentType.getConstructSignatures is not a function".
        env:
          GODEBUG: asyncpreemptoff=1
        run: |
          @'
          const ts = require('./staging/lib/typescript.js');
          const fs = require('fs');
          fs.mkdirSync('cq/src', { recursive: true });
          fs.writeFileSync('cq/tsconfig.json', JSON.stringify({ compilerOptions: { strict: true, noEmit: true }, include: ['src/**/*.ts'] }));
          fs.writeFileSync('cq/src/index.ts', 'export function Foo(x: string): number { return 1; }\n');
          const host = {
            getScriptFileNames: () => [process.cwd() + '/cq/src/index.ts'],
            getScriptVersion: () => '1',
            getScriptSnapshot: f => fs.existsSync(f) ? ts.ScriptSnapshot.fromString(fs.readFileSync(f, 'utf8')) : undefined,
            getCurrentDirectory: () => process.cwd() + '/cq',
            getCompilationSettings: () => ({ strict: true, noEmit: true, configFilePath: process.cwd() + '/cq/tsconfig.json' }),
            getDefaultLibFileName: o => ts.getDefaultLibFilePath(o),
            fileExists: ts.sys.fileExists, readFile: ts.sys.readFile, readDirectory: ts.sys.readDirectory,
            directoryExists: ts.sys.directoryExists, getDirectories: ts.sys.getDirectories,
            useCaseSensitiveFileNames: () => ts.sys.useCaseSensitiveFileNames,
            getNewLine: () => '\n',
          };
          const ls = ts.createLanguageService(host);
          const program = ls.getProgram();
          const checker = program.getTypeChecker();
          const sf = program.getSourceFile(process.cwd() + '/cq/src/index.ts');
          if (!sf || !sf.statements || !sf.statements.length) { console.error('FAIL: no source file statements'); process.exit(1); }
          const t = checker.getTypeAtLocation(sf.statements[0].name);
          if (typeof t.getConstructSignatures !== 'function' || typeof t.getCallSignatures !== 'function') {
            console.error('FAIL: type lacks proto methods (fallback not fixed up)'); process.exit(1);
          }
          const callSigs = t.getCallSignatures();
          if (callSigs.length !== 1) { console.error('FAIL: node mapping broken — expected 1 call signature, got ' + callSigs.length); process.exit(1); }
          // win32: hosts hand backslash paths (path.resolve) to getSourceFile —
          // the membership gate must normalize them (ts-named-exports crash).
          const bsSf = program.getSourceFile(require('path').join(process.cwd(), 'cq', 'src', 'index.ts'));
          if (!bsSf) { console.error('FAIL: getSourceFile(backslash path) returned undefined'); process.exit(1); }
          console.log('CHECKER-QUERY-OK');
          '@ | Set-Content -Encoding ascii checker-query.js
          node checker-query.js
          echo "CHECKER-QUERY-EXIT=$LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Host-overlay module resolves (Volar .vue shape)
        # win32 overlay-path regression: handleUpdateSnapshot made overlay
        # paths absolute with a POSIX-only check (HasPrefix "/"), prepending
        # the cwd to every drive-letter overlay — the .vue virtual content
        # landed on a garbage path and the real file answered "not a module"
        # (component-meta getCallSignatures → 0). Probe: a .ts importing a
        # .vue whose TS content arrives only via host overlay.
        env:
          GODEBUG: asyncpreemptoff=1
        run: |
          @'
          const ts = require('./staging/lib/typescript.js');
          const fs = require('fs');
          fs.mkdirSync('ov', { recursive: true });
          fs.writeFileSync('ov/tsconfig.json', JSON.stringify({ compilerOptions: { strict: true, noEmit: true, allowArbitraryExtensions: true }, include: ['**/*'] }));
          fs.writeFileSync('ov/main.ts', 'import C from "./component.vue";\nexport const n: number = C;\n');
          const vueTs = 'const C: number = 1;\nexport default C;\n';
          const host = {
            getScriptFileNames: () => [process.cwd() + '/ov/main.ts', process.cwd() + '/ov/component.vue'],
            getScriptVersion: () => '1',
            getScriptSnapshot: f => f.endsWith('component.vue') ? ts.ScriptSnapshot.fromString(vueTs) : (fs.existsSync(f) ? ts.ScriptSnapshot.fromString(fs.readFileSync(f, 'utf8')) : undefined),
            getCurrentDirectory: () => process.cwd() + '/ov',
            getCompilationSettings: () => ({ strict: true, noEmit: true, allowArbitraryExtensions: true, configFilePath: process.cwd() + '/ov/tsconfig.json' }),
            getDefaultLibFileName: o => ts.getDefaultLibFilePath(o),
            fileExists: f => f.endsWith('component.vue') || ts.sys.fileExists(f),
            readFile: f => f.endsWith('component.vue') ? vueTs : ts.sys.readFile(f),
            readDirectory: ts.sys.readDirectory, directoryExists: ts.sys.directoryExists, getDirectories: ts.sys.getDirectories,
            useCaseSensitiveFileNames: () => ts.sys.useCaseSensitiveFileNames,
            getNewLine: () => '\n',
          };
          const ls = ts.createLanguageService(host);
          const program = ls.getProgram();
          const sf = program.getSourceFile(process.cwd() + '/ov/main.ts');
          const diags = program.getSemanticDiagnostics(sf);
          if (diags.some(d => d.code === 2306)) { console.error('FAIL: .vue overlay not applied (TS2306 not a module)'); process.exit(1); }
          if (diags.length) { console.error('FAIL: unexpected diagnostics ' + JSON.stringify(diags.map(d => d.code))); process.exit(1); }
          console.log('OVERLAY-MODULE-OK');
          '@ | Set-Content -Encoding ascii overlay-module.js
          node overlay-module.js
          echo "OVERLAY-MODULE-EXIT=$LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Collect crash evidence
        # A silent load failure is a hard crash before V8 can report; Windows
        # Error Reporting still records the exception code and faulting module.
        if: failure()
        run: |
          Get-WinEvent -FilterHashtable @{LogName='Application'; ProviderName='Application Error'} -MaxEvents 3 -ErrorAction SilentlyContinue | Format-List TimeCreated, Message
          Get-WinEvent -FilterHashtable @{LogName='Application'; ProviderName='Windows Error Reporting'} -MaxEvents 3 -ErrorAction SilentlyContinue | Format-List TimeCreated, Message

  publish:
    needs: [build-lib, build-bridge, build-bridge-linux, test-bridge-win32-x64]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1 # tools/pack-platform-packages.mjs

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Ensure npm >= 11.5.1 (trusted publishing)
        run: npm install -g npm@latest

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage main package
        run: |
          mkdir staging
          cp -R artifacts/lib-dist/. staging/
          mkdir bridges
          for d in artifacts/bridge-*; do cp -R "$d" "bridges/$(basename "$d")"; done

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./staging/package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "tag $TAG != package.json version $PKG"
            exit 1
          fi

      - name: Assemble platform sub-packages
        run: node tools/pack-platform-packages.mjs staging bridges subpkgs

      - name: Publish platform sub-packages
        run: |
          set -euo pipefail
          for d in subpkgs/*; do
            echo "== publishing $(basename "$d") =="
            (cd "$d" && npm publish --provenance --tag latest)
          done
        env:
          # Empty when the secret is unset: npm then falls back to OIDC trusted publishing.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        # --tag latest: the version is a semver prerelease (x.y.z-bridge.N…),
        # so npm requires an EXPLICIT tag (default would be rejected), but an
        # explicit `latest` is accepted. latest is the only dist-tag; no
        # per-line alias tags are kept.
        run: npm publish --provenance --tag latest
        working-directory: staging
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
